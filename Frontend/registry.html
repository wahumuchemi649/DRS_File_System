<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="registry.css">
  <title>DRS - Registry</title>

</head>

<body>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="header">
      <h2>Registry Dashboard</h2>
      <div style="display:flex; align-items:center; gap:16px;">
        <span class="welcome" id="welcomeText"></span>
        <button class="btn btn-red btn-small" onclick="handleLogout()">Logout</button>
      </div>
    </div>

    <div class="content">
      <div class="actions">
        <button class="btn btn-small" onclick="openModal('registerModal')">+ Register Document</button>
        <button class="btn btn-green btn-small" onclick="openModal('routeModal')">→ Route Document</button>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="loadDocs('Received', this)">Received</div>
        <div class="tab" onclick="loadDocs('Registered', this)">Registered</div>
        <div class="tab" onclick="loadDocs('Routed', this)">Routed</div>
        <div class="tab" onclick="loadDocs('Under Review', this)">Under Review</div>
        <div class="tab" onclick="loadDocs('Approved', this)">Approved</div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Doc ID</th>
            <th>Ref No</th>
            <th>Title</th>
            <th>Type</th>
            <th>Date Created</th>
            <th>Department</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="docsTable">
          <tr class="empty-row">
            <td colspan="7">Select a tab to load documents</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- REGISTER MODAL — now takes a Doc ID -->
  <div class="modal" id="registerModal">
    <div class="modal-box">
      <h3>Register Received Document</h3>
      <label>Document ID</label>
      <input type="number" id="regDocId" placeholder="Enter ID of received document">
      <p style="font-size:12px; color:#666; margin-top:-10px; margin-bottom:16px;">
        The document must already be in "Received" status
      </p>
      <div class="modal-actions">
        <button class="btn btn-small" onclick="handleRegister()">Register</button>
        <button class="btn btn-small btn-red" onclick="closeModal('registerModal')">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ROUTE MODAL -->
  <div class="modal" id="routeModal">
    <div class="modal-box">
      <h3>Route Document</h3>
      <label>Document ID</label>
      <input type="number" id="routeDocId" placeholder="Enter document ID">
      <label>Route to Department ID</label>
      <input type="text" id="routeDeptId" placeholder="e.g. HR01">
      <div class="modal-actions">
        <button class="btn btn-green btn-small" onclick="handleRoute()">Route Document</button>
        <button class="btn btn-small btn-red" onclick="closeModal('routeModal')">Cancel</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = 'http://127.0.0.1:5000';
    let currentUser = null;

    // Check session on page load
    const savedUser = sessionStorage.getItem('currentUser');
    if (!savedUser) {
      window.location.href = 'index.html';
    } else {
      currentUser = JSON.parse(savedUser);
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('welcomeText').textContent =
        `Welcome, ${currentUser.email} (${currentUser.roles})`;
      loadDocs('Received', document.querySelector('.tab'));
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type}`;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3500);
    }

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function getBadgeClass(status) {
      const map = {
        'Received': 'badge-received',
        'Registered': 'badge-registered',
        'Routed': 'badge-routed',
        'Under Review': 'badge-review',
        'Approved': 'badge-approved'
      };
      return map[status] || '';
    }

    async function loadDocs(status, tabEl) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tabEl.classList.add('active');

      const tbody = document.getElementById('docsTable');
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">Loading...</td></tr>';

      try {
        const res = await fetch(`${API}/Registry/documents?status=${encodeURIComponent(status)}`);
        const data = await res.json();

        if (data.documents && data.documents.length > 0) {
          tbody.innerHTML = data.documents.map(doc => `
            <tr>
              <td>${doc.docId}</td>
              <td>${doc.refNo || '—'}</td>
              <td>${doc.title || '—'}</td>
              <td>${doc.docType || '—'}</td>
              <td>${doc.dateCreated ? doc.dateCreated.split('.')[0] : '—'}</td>
              <td>${doc.deptId || '—'}</td>
              <td><span class="badge ${getBadgeClass(doc.status)}">${doc.status}</span></td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = `<tr class="empty-row"><td colspan="7">No documents with status: ${status}</td></tr>`;
        }
      } catch (err) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7" style="color:red">Failed to load documents</td></tr>';
      }
    }

    async function handleRegister() {
      const docId = parseInt(document.getElementById('regDocId').value);

      if (!docId) { showToast('Please enter a Document ID', 'error'); return; }

      try {
        const res = await fetch(`${API}/Registry/documents/register-by-id`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ docId })
        });

        const data = await res.json();
        closeModal('registerModal');

        if (res.ok) {
          showToast(`Document registered! Ref: ${data.ref_no}`);
          document.getElementById('regDocId').value = '';
          loadDocs('Registered', document.querySelectorAll('.tab')[1]);
        } else {
          showToast(data.error || 'Registration failed', 'error');
        }
      } catch (err) {
        showToast('Could not connect to server', 'error');
      }
    }

    async function handleRoute() {
      const docId = parseInt(document.getElementById('routeDocId').value);
      const deptId = document.getElementById('routeDeptId').value.trim();

      if (!docId || !deptId) { showToast('Both fields are required', 'error'); return; }

      try {
        const res = await fetch(`${API}/Registry/documents/route`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ docId, deptId })
        });

        const data = await res.json();
        closeModal('routeModal');

        if (res.ok) {
          showToast(`Document routed to ${data.deptId} successfully!`);
          document.getElementById('routeDocId').value = '';
          document.getElementById('routeDeptId').value = '';
          loadDocs('Routed', document.querySelectorAll('.tab')[2]);
        } else {
          showToast(data.error || 'Routing failed', 'error');
        }
      } catch (err) {
        showToast('Could not connect to server', 'error');
      }
    }

    function handleLogout() {
      currentUser = null;
      sessionStorage.removeItem('currentUser');
      window.location.href = 'index.html';
    }
  </script>
</body>

</html>
