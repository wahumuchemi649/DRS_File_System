<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="registry.css">
  <title>DRS - Registry</title>
</head>

<body>

  <!-- LOGIN -->
  <div class="login-container" id="loginPage">
    <div class="login-box">
      <h2>DRS File System</h2>
      <p>Registry Portal — Please sign in</p>
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="you@example.com">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password">
      <button class="btn" onclick="handleLogin()">Sign In</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="header">
      <h2>Registry Dashboard</h2>
      <div style="display:flex; align-items:center; gap:16px;">
        <span class="welcome" id="welcomeText"></span>
        <button class="btn btn-red btn-small" onclick="handleLogout()">Logout</button>
      </div>
    </div>

    <div class="content">
      <!-- Quick Actions -->
      <div class="actions">
        <button class="btn btn-small" onclick="openModal('registerModal')">+ Register Document</button>
        <button class="btn btn-green btn-small" onclick="openModal('routeModal')">→ Route Document</button>
      </div>

      <!-- Status Tabs -->
      <div class="tabs">
        <div class="tab active" onclick="loadDocs('Received', this)">Received</div>
        <div class="tab" onclick="loadDocs('Registered', this)">Registered</div>
        <div class="tab" onclick="loadDocs('Routed', this)">Routed</div>
        <div class="tab" onclick="loadDocs('Under Review', this)">Under Review</div>
        <div class="tab" onclick="loadDocs('Approved', this)">Approved</div>
      </div>

      <!-- Table -->
      <table>
        <thead>
          <tr>
            <th>Doc ID</th>
            <th>Ref No</th>
            <th>Title</th>
            <th>Type</th>
            <th>Date Created</th>
            <th>Department</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="docsTable">
          <tr class="empty-row">
            <td colspan="7">Select a tab to load documents</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- REGISTER MODAL -->
  <div class="modal" id="registerModal">
    <div class="modal-box">
      <h3>Register New Document</h3>
      <label>Title</label>
      <input type="text" id="regTitle" placeholder="Document title">
      <label>Document Type</label>
      <select id="regType">
        <option value="Report">Report</option>
        <option value="Notice">Notice</option>
        <option value="Discussion">Discussion</option>
        <option value="Request">Request</option>
      </select>
      <label>Department ID (optional)</label>
      <input type="text" id="regDeptId" placeholder="e.g. HR01">
      <label>File Path</label>
      <input type="text" id="regFilePath" placeholder="/files/document.pdf">
      <label>External Document?</label>
      <select id="regExternal">
        <option value="false">No (Internal)</option>
        <option value="true">Yes (External)</option>
      </select>
      <div class="modal-actions">
        <button class="btn btn-small" onclick="handleRegister()">Register</button>
        <button class="btn btn-small btn-red" onclick="closeModal('registerModal')">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ROUTE MODAL -->
  <div class="modal" id="routeModal">
    <div class="modal-box">
      <h3>Route Document</h3>
      <label>Document ID</label>
      <input type="number" id="routeDocId" placeholder="Enter document ID">
      <label>Route to Department ID</label>
      <input type="text" id="routeDeptId" placeholder="e.g. HR01">
      <div class="modal-actions">
        <button class="btn btn-green btn-small" onclick="handleRoute()">Route Document</button>
        <button class="btn btn-small btn-red" onclick="closeModal('routeModal')">Cancel</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    const API = 'http://127.0.0.1:5000';
    let currentUser = null;

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type}`;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3500);
    }

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function getBadgeClass(status) {
      const map = {
        'Received': 'badge-received',
        'Registered': 'badge-registered',
        'Routed': 'badge-routed',
        'Under Review': 'badge-review',
        'Approved': 'badge-approved'
      };
      return map[status] || '';
    }


    async function loadDocs(status, tabEl) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tabEl.classList.add('active');

      const tbody = document.getElementById('docsTable');
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">Loading...</td></tr>';

      try {
        const res = await fetch(`${API}/Registry/documents?status=${encodeURIComponent(status)}`);
        const data = await res.json();

        if (data.documents && data.documents.length > 0) {
          tbody.innerHTML = data.documents.map(doc => `
                    <tr>
                        <td>${doc.docId}</td>
                        <td>${doc.refNo || '—'}</td>
                        <td>${doc.title || '—'}</td>
                        <td>${doc.docType || '—'}</td>
                        <td>${doc.dateCreated ? doc.dateCreated.split('.')[0] : '—'}</td>
                        <td>${doc.deptId || '—'}</td>
                        <td><span class="badge ${getBadgeClass(doc.status)}">${doc.status}</span></td>
                    </tr>
                `).join('');
        } else {
          tbody.innerHTML = `<tr class="empty-row"><td colspan="7">No documents with status: ${status}</td></tr>`;
        }
      } catch (err) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7" style="color:red">Failed to load documents</td></tr>';
      }
    }

    async function handleRegister() {
      const title = document.getElementById('regTitle').value.trim();
      const docType = document.getElementById('regType').value;
      const deptId = document.getElementById('regDeptId').value.trim() || null;
      const filePath = document.getElementById('regFilePath').value.trim();
      const isExternal = document.getElementById('regExternal').value === 'true';

      if (!title) { showToast('Title is required', 'error'); return; }

      try {
        const res = await fetch(`${API}/Registry/documents/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, docType, deptId, filePath, isExternal })
        });

        const data = await res.json();
        closeModal('registerModal');

        if (res.ok) {
          showToast(`Document registered! Ref: ${data.ref_no}`);
          document.getElementById('regTitle').value = '';
          document.getElementById('regFilePath').value = '';
          document.getElementById('regDeptId').value = '';
          loadDocs('Registered', document.querySelectorAll('.tab')[1]);
        } else {
          showToast(data.error || 'Registration failed', 'error');
        }
      } catch (err) {
        showToast('Could not connect to server', 'error');
      }
    }

    async function handleRoute() {
      const docId = parseInt(document.getElementById('routeDocId').value);
      const deptId = document.getElementById('routeDeptId').value.trim();

      if (!docId || !deptId) { showToast('Both fields are required', 'error'); return; }

      try {
        const res = await fetch(`${API}/Registry/documents/route`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ docId, deptId })
        });

        const data = await res.json();
        closeModal('routeModal');

        if (res.ok) {
          showToast(`Document routed to ${data.deptId} successfully!`);
          document.getElementById('routeDocId').value = '';
          document.getElementById('routeDeptId').value = '';
          loadDocs('Routed', document.querySelectorAll('.tab')[2]);
        } else {
          showToast(data.error || 'Routing failed', 'error');
        }
      } catch (err) {
        showToast('Could not connect to server', 'error');
      }
    }

    function handleLogout() {
      currentUser = null;
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPassword').value = '';
      showToast('Logged out successfully');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') {
        handleLogin();
      }
    });
  </script>
</body>

</html>
