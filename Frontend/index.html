                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="firstName" required>

                <label for="email">Email:</label>

                <select id="role" name="role" required>
                    <option value="">Select Role</option>
                    <option value="Admin">Admin</option>
                    <option value="Department Head">Department Head</option>
                    <option value="Officer">Officer</option>
                    <option value="Registry">Registry</option>
                </select>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <label for="confirm_password">Confirm Password:</label>

                <button type="submit">Sign Up</button>

            <h2>Login</h2>
            <form id="loginForm">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const signupForm = document.querySelector('#signupForm');
        const loginForm = document.querySelector('#loginForm');

        signupForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!"); return;
            }
            if (password.length < 6) {
                alert("Password must be at least 6 characters long!"); return;
            }
            if (!signupForm.role.value || signupForm.email.value.trim() === "") {
                alert("Please fill in all required fields!"); return;
            }
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(signupForm.email.value)) {
                alert("Please enter a valid email address!"); return;
            }

            
            const body = {
                firstName: signupForm.firstName.value,
                lastName: signupForm.lastName.value,
                email: signupForm.email.value,
                password: signupForm.password.value,
                role: signupForm.role.value,
                deptId: null
            };

            fetch('http://127.0.0.1:5000/Auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },  
                body: JSON.stringify(body)                         
            })
                .then(response => response.json())
                .then(data => {
                    console.log('Server response:', data);
                    if (data.error) {
                        alert(data.error);
                        return;
                    }
                    alert(data.message);
                })
                .catch(error => console.error('Error:', error));
        });

        loginForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const body = {
                email: loginForm.email.value,
                password: loginForm.password.value
            };

            fetch('http://127.0.0.1:5000/Auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            })
                .then(response => response.json())
                .then(data => {
                    console.log('Server response:', data);
                    if (data.error) {
                        alert(data.error);
                        return;
                    }
                    sessionStorage.setItem('currentUser', JSON.stringify(data));
                    if (data.roles === 'Registry') {
                        window.location.href = 'registry.html';
                    } else if (data.roles === 'Admin') {
                        window.location.href = 'Admin.html';
                    } else if (data.roles === 'Department Head') {
                        window.location.href = 'Department_head.html';
                    } else if (data.roles === 'Officer') {
                        window.location.href = 'Officers.html';
                    } else {
                        alert('Unknown role: ' + data.roles);
                    }

                })
                .catch(error => console.error('Error:', error));
        });
    });
async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showToast('Please enter email and password', 'error');
        return;
      }

      try {
        const res = await fetch(`${API}/Auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          if (data.roles !== 'Registry') {
            showToast('Access denied. Registry users only.', 'error');
            return;
          }
          currentUser = data;
          document.getElementById('loginPage').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          document.getElementById('welcomeText').textContent =
            `Welcome, ${data.email} (${data.roles})`;
          loadDocs('Received', document.querySelector('.tab'));
        } else {
          showToast(data.error || 'Login failed', 'error');
        }
      } catch (err) {
        showToast('Cannot connect to server. Is Flask running?', 'error');
      }
    }

</script>
